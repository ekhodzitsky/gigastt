[package]
name = "gigastt"
version = "0.1.1"
edition = "2024"
description = "Local STT server powered by GigaAM v3 e2e_rnnt — on-device Russian speech recognition via ONNX Runtime"
license = "MIT"
repository = "https://github.com/ekhodzitsky/gigastt"
keywords = ["stt", "speech-recognition", "gigaam", "onnx", "russian"]
categories = ["multimedia::audio", "command-line-utilities"]

[dependencies]
# ONNX Runtime
ort = { version = "2.0.0-rc.12", features = ["coreml"] }

# Async runtime
tokio = { version = "1", features = ["full"] }

# WebSocket server
tokio-tungstenite = "0.24"
futures-util = "0.3"

# CLI
clap = { version = "4", features = ["derive"] }

# HTTP client for model download
reqwest = { version = "0.12", features = ["stream"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Progress bar
indicatif = "0.17"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "2"

# File hashing
sha2 = "0.10"

# FFT for mel spectrogram
rustfft = "6"

# Audio file reading (for `transcribe` command)
hound = "3.5"

# Directory management
dirs = "6"

[dev-dependencies]
tempfile = "3"

[profile.release]
lto = true
codegen-units = 1
strip = true
