[advisories]
version = 2
yanked = "deny"
ignore = [
    # prost-types 0.6.1 (RUSTSEC-2021-0073) is pulled in transitively by
    # onnx-pb 0.1.4 → prost-build 0.6.x ONLY under the `quantize` build
    # feature. The affected code path (`From<Timestamp> for SystemTime`)
    # is not reached by our quantization pipeline — we never convert an
    # untrusted protobuf `Timestamp`. Remove once onnx-pb upgrades.
    "RUSTSEC-2021-0073",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "Unicode-3.0",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-DFS-2016",
    # webpki-root-certs is just the Mozilla CA bundle; CDLA-Permissive-2.0
    # is a community-data license that behaves like MIT for us.
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
