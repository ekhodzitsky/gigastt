[advisories]
version = 2
yanked = "deny"
ignore = [
    # prost-types 0.6.1 (RUSTSEC-2021-0073) is pulled in transitively by
    # onnx-pb 0.1.4 → prost-build 0.6.x. As of 2026-04 `onnx-pb` has no
    # newer release on crates.io (0.1.4 is the only published version) and
    # no modern replacement with equivalent API exists (`onnx-protobuf` on
    # the `protobuf` crate family has an unrelated compile bug at 0.2.3).
    # The affected code path (`From<Timestamp> for SystemTime`) is not
    # reached by our quantization pipeline — we never convert an untrusted
    # protobuf `Timestamp`. Re-evaluate when a modern ONNX protobuf crate
    # becomes available.
    "RUSTSEC-2021-0073",
]

[licenses]
version = 2
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "Unicode-3.0",
    "ISC",
    "CC0-1.0",
    "Zlib",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-DFS-2016",
    # webpki-root-certs is just the Mozilla CA bundle; CDLA-Permissive-2.0
    # is a community-data license that behaves like MIT for us.
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
